name: Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: 20
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/video-app-frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/video-app-backend

jobs:
  frontend-check:
    name: Frontend check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video-app/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: video-app/frontend/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  backend-check:
    name: Backend check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video-app/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: video-app/backend/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate backend modules
        run: >
          node -e
          "Promise.all([
          import('./routes/auth.js'),
          import('./routes/meet.js'),
          import('./routes/chat.js'),
          import('./routes/admin.js'),
          import('./routes/transcript.js'),
          import('./routes/sarvam.js'),
          import('./socket/handlers.js')
          ]).then(() => console.log('backend modules ok')).catch((err) => { console.error(err); process.exit(1); })"

  build-frontend-image:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs:
      - frontend-check
      - backend-check
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify frontend build variables
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SOCKET_URL: ${{ vars.NEXT_PUBLIC_SOCKET_URL }}
        run: |
          test -n "$NEXT_PUBLIC_API_URL" || (echo "Set repository variable NEXT_PUBLIC_API_URL" && exit 1)
          test -n "$NEXT_PUBLIC_SOCKET_URL" || (echo "Set repository variable NEXT_PUBLIC_SOCKET_URL" && exit 1)

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: video-app/frontend
          file: video-app/frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ vars.NEXT_PUBLIC_SOCKET_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  build-backend-image:
    name: Build backend image
    runs-on: ubuntu-latest
    needs:
      - frontend-check
      - backend-check
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: video-app/backend
          file: video-app/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
