services:
  migrate:
    image: ghcr.io/${GHCR_OWNER:-your-github-username}/video-app-backend:${IMAGE_TAG:-latest}
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      SARVAM_API_KEY: ${SARVAM_API_KEY}
    command: ["node", "db/migrate.js"]

  backend:
    image: ghcr.io/${GHCR_OWNER:-your-github-username}/video-app-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      SARVAM_API_KEY: ${SARVAM_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    image: ghcr.io/${GHCR_OWNER:-your-github-username}/video-app-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
